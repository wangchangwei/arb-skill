<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540">
  <style>
    text { font-family: "PingFang SC", "Microsoft YaHei", "SimHei", sans-serif; }
  </style>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="1200" height="540" fill="#f8f6f3"/>
  <text x="600" y="38" text-anchor="middle" fill="#1a1a1a" font-size="18" font-weight="700">仲裁-skill 完整流程</text>
  <text x="600" y="58" text-anchor="middle" fill="#6a6a6a" font-size="11">用户上传文件 → AI分析 → 权益计算 → 证据评估 → 报告生成 → 仲裁指引</text>
  <rect x="30" y="80" width="1100" height="60" rx="8" fill="#a8c5e6" opacity="0.2"/>
  <text x="50" y="100" fill="#4a4a4a" font-size="11" font-weight="600">输入层 INPUT</text>
