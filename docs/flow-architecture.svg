  <line x1="435" y1="325" x2="480" y2="325" stroke="#5a5a5a" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="650" y1="325" x2="695" y2="325" stroke="#5a5a5a" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="865" y1="325" x2="910" y2="325" stroke="#5a5a5a" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="30" y="405" width="1100" height="60" rx="8" fill="#f4e4c1" opacity="0.2"/>
  <text x="50" y="425" fill="#4a4a4a" font-size="11" font-weight="600">输出层 OUTPUT</text>
  <text x="50" y="443" fill="#6a6a6a" font-size="11">ComprehensivePdfFormatter — 完整仲裁证据报告（JSON · Excel · PDF · HTML）</text>
  <rect x="30" y="480" width="1100" height="50" rx="8" fill="#e8e6e3" opacity="0.4"/>
  <text x="50" y="500" fill="#4a4a4a" font-size="11" font-weight="600">仲裁指引层 ARB-ROADMAP</text>
  <text x="50" y="518" fill="#6a6a6a" font-size="11">收集证据 → 提交申请 → 开庭 → 裁决执行</text>
  <line x1="1150" y1="140" x2="1150" y2="165" stroke="#5a5a5a" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="1150" y1="225" x2="1150" y2="250" stroke="#5a5a5a" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="1150" y1="380" x2="1150" y2="405" stroke="#5a5a5a" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="1150" y1="465" x2="1150" y2="480" stroke="#5a5a5a" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
</svg>