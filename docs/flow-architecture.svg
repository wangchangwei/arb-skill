  <rect x="30" y="165" width="1100" height="60" rx="8" fill="#a8c5e6" opacity="0.2"/>
  <text x="50" y="185" fill="#4a4a4a" font-size="11" font-weight="600">解析层 PARSE</text>
  <text x="50" y="203" fill="#6a6a6a" font-size="11">parse_attendance_file() — AI 读取原始文件返回结构化文本，无 API 依赖</text>
